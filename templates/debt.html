{% extends 'base.html' %}{% block content %}<h3>Công nợ</h3><div class="card p-3"><table class="table"><tr><th>Mã đơn</th><th>Khách</th><th>Tổng</th><th>Đã trả</th><th>Còn nợ</th><th>Ngày tạo</th></tr>{% for o in orders %}<tr><td>{{o.order_code}}</td><td>{{o.customer.name}}</td><td>{{o.total|money}}</td><td>{{o.paid_amount|money}}</td><td class="money">{{(o.total-o.paid_amount)|money}}</td><td>{{o.created_at.strftime('%d/%m/%Y')}}</td></tr>{% endfor %}</table></div>{% endblock %}
