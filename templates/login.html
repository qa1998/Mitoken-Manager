<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập — Business Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <span class="login-brand-icon"><i class="bi bi-box-seam-fill"></i></span>
      <h1>Business Web</h1>
      <p class="text-muted mb-0">Đăng nhập để tiếp tục</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="login-flashes">
      {% for category, message in messages %}
      <div class="alert alert-{{ category if category in ['success','danger','warning','info','secondary'] else 'secondary' }} py-2 mb-2">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <form method="post" class="login-form">
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <div class="mb-3">
        <label class="form-label">Tên đăng nhập</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" required autofocus autocomplete="username" placeholder="admin">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Mật khẩu</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" required autocomplete="current-password" placeholder="••••••••">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 login-submit-btn">
        <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
      </button>
    </form>

    <p class="login-hint text-muted small mb-0">
      Lần đầu: <code>admin</code> / <code>admin123</code> — đổi mật khẩu sau khi đăng nhập.
    </p>
  </div>
</body>
</html>
