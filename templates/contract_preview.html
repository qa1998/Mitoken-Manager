{% extends 'base.html' %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
  <div>
    <h3 class="mb-0">Xem trước hợp đồng</h3>
    <p class="small-muted mb-0">{{ contract_code }} — {{ customer_name }}{% if is_draft %} <span class="badge badge-soft">Bản nháp</span>{% endif %}</p>
  </div>
  <div class="d-flex gap-2">
    {% if download_url %}
    <a class="btn btn-outline-primary" href="{{ download_url }}">Tải Word</a>
    {% endif %}
    <button type="button" class="btn btn-outline-secondary" onclick="window.print()">In</button>
    <a class="btn btn-secondary" href="{{ back_url or url_for('customers') }}">Quay lại</a>
  </div>
</div>
<div class="doc-preview-wrap">
  <article class="doc-preview-paper">
    {{ preview_html|safe }}
  </article>
</div>
{% endblock %}
