{% extends 'print_base.html' %}
{% block title %}Hóa đơn {{ order.order_code }}{% endblock %}
{% block content %}
<div class="quote-print-toolbar no-print">
  <button type="button" class="btn btn-primary" onclick="window.print()"><i class="bi bi-printer"></i> In / Lưu PDF</button>
  <button type="button" class="btn" onclick="window.close()">Đóng</button>
</div>
<div class="quote-print-page-body">
  {% with doc_kind='invoice' %}
  {% include 'partials/quote_document.html' %}
  {% endwith %}
</div>
{% endblock %}
{% block extra_js %}
<script>
  window.addEventListener('load', function () {
    setTimeout(function () { window.print(); }, 400);
  });
</script>
{% endblock %}
