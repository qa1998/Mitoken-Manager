{% macro product_image_upload_panel(product=none, editable=false) %}
{% set external_url = product_external_image_url(product) if product else '' %}
<div class="product-image-url-panel">
  <label class="form-label-custom mb-2">URL hình ảnh</label>
  <div class="product-image-url-field">
    <input type="url"
           name="image_url"
           class="form-control product-image-url-input"
           value="{{ external_url }}"
           placeholder="https://example.com/image.jpg"
           autocomplete="off"
           inputmode="url">
    <div class="product-image-url-preview mt-2{% if not external_url %} d-none{% endif %}" data-image-url-preview>
      <img src="{{ external_url }}" alt="" class="product-image-url-preview-img">
    </div>
  </div>
  <p class="product-images-hint small-muted mb-0 mt-2">
    Dán link ảnh trực tiếp (<code>https://...</code>). Sản phẩm nhiều biến thể: nhập URL riêng ở từng dòng biến thể bên dưới.
  </p>
</div>
{% endmacro %}
