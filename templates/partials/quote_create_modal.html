<div class="modal fade" id="createQuoteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered quote-create-dialog">
    <div class="modal-content quote-create-modal">
      <div class="modal-header quote-create-header">
        <h5 class="modal-title">Tạo báo giá mới</h5>
        <div class="quote-create-header-actions">
          <button type="button" class="btn btn-outline-secondary btn-sm quote-preview-toggle-btn" id="btn-toggle-quote-preview" aria-pressed="true">
            <i class="bi bi-eye me-1"></i>Xem trước
          </button>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
      </div>
      <div class="quote-create-layout">
        <form method="post" action="{{ url_for('quotes') }}" id="create-quote-form" class="quote-form quote-create-form">
          <div class="quote-create-body">
            <div class="quote-create-top">
              <div class="quote-create-meta-grid">
                <div class="quote-meta-field quote-meta-customer">
                  <label class="form-label-custom">Khách hàng</label>
                  <div class="quote-meta-input-row">
                    <div class="input-icon-wrap flex-grow-1">
                      <i class="bi bi-person"></i>
                      <select name="customer_id" class="form-select" id="quote-customer-select">
                        <option value="" selected>Khách vãng lai (không cần thông tin)</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                      </select>
                    </div>
                    <a href="{{ url_for('customers', from='quotes') }}" target="_blank" class="btn btn-outline-primary btn-sm text-nowrap flex-shrink-0 quote-add-customer-btn" id="quote-add-customer-link">
                      <i class="bi bi-plus-lg"></i> Thêm KH
                    </a>
                  </div>
                </div>
                <div class="quote-meta-field">
                  <label class="form-label-custom">Bảng giá <span class="text-danger">*</span></label>
                  <div class="input-icon-wrap">
                    <i class="bi bi-tag"></i>
                    <select class="form-select quote-price-list" id="quote-price-list">
                      <option value="dealer" selected>Giá sỉ / đại lý</option>
                      <option value="project">Giá công trình</option>
                      <option value="retail">Giá lẻ</option>
                    </select>
                  </div>
                </div>
                <div class="quote-meta-field quote-meta-narrow">
                  <label class="form-label-custom">VAT (%)</label>
                  <input name="vat_rate" type="number" min="0" max="100" class="form-control quote-calc-input quote-vat-rate text-center" id="quote-vat-rate" value="0">
                </div>
                <div class="quote-meta-field quote-meta-narrow">
                  <label class="form-label-custom">CK (%)</label>
                  <input type="number" min="0" max="100" class="form-control quote-calc-input quote-discount-percent text-center" id="quote-discount-percent" value="0">
                  <input type="hidden" name="discount" class="quote-discount-amount" id="quote-discount-amount" value="0">
                </div>
                <div class="quote-meta-field">
                  <label class="form-label-custom">Hiệu lực đến</label>
                  <div class="input-icon-wrap">
                    <i class="bi bi-calendar3"></i>
                    <input type="date" name="valid_until" class="form-control quote-preview-input" value="{{ default_valid }}">
                  </div>
                </div>
              </div>

              <button class="quote-note-toggle collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#quote-note-collapse" aria-expanded="false">
                <i class="bi bi-journal-text"></i>
                <span>Ghi chú thêm</span>
                <small class="text-muted">(Không bắt buộc)</small>
                <i class="bi bi-chevron-down quote-note-toggle-caret"></i>
              </button>
              <div class="collapse" id="quote-note-collapse">
                <div class="quote-note-collapse-body">
                  <textarea name="note" class="form-control quote-preview-input" rows="2" maxlength="500" placeholder="Ghi chú báo giá (nếu có)" id="quote-note-input"></textarea>
                  <div class="text-end small-muted mt-1"><span id="quote-note-count">0</span>/500</div>
                </div>
              </div>
            </div>

            <div class="quote-lines-section">
              <p class="quote-lines-section-title">Chi tiết hàng hóa</p>
              <div class="quote-lines-table-wrap">
                <table class="table quote-lines-table mb-0">
                  <thead>
                    <tr>
                      <th class="col-num">#</th>
                      <th>Sản phẩm</th>
                      <th class="col-stock">Tồn kho</th>
                      <th class="col-unit">Đơn vị</th>
                      <th class="col-qty">SL</th>
                      <th class="col-price">Đơn giá</th>
                      <th class="col-line-disc">CK (%)</th>
                      <th class="col-amount">Thành tiền</th>
                      <th class="col-actions text-end">Thao tác</th>
                    </tr>
                  </thead>
                  <tbody class="quote-items-body" id="quote-items-body"></tbody>
                </table>
              </div>
              <button type="button" class="btn btn-outline-primary btn-sm quote-add-row-btn" id="btn-add-quote-row">
                <i class="bi bi-plus-lg me-1"></i> Thêm sản phẩm
              </button>
            </div>

            <div class="quote-create-footer">
              <div class="quote-create-summary">
                <div class="quote-summary-line">
                  <span>Tổng tiền hàng</span>
                  <span class="quote-summary-subtotal" id="quote-summary-subtotal">0 đ</span>
                </div>
                <div class="quote-summary-line is-discount">
                  <span class="quote-summary-discount-label" id="quote-summary-discount-label">Tổng chiết khấu (0%)</span>
                  <span class="quote-summary-discount" id="quote-summary-discount">-0 đ</span>
                </div>
                <div class="quote-summary-line">
                  <span class="quote-summary-vat-label" id="quote-summary-vat-label">VAT (0%)</span>
                  <span class="quote-summary-vat" id="quote-summary-vat">0 đ</span>
                </div>
                <div class="quote-summary-grand">
                  <span>Tổng thanh toán</span>
                  <span class="quote-summary-total" id="quote-summary-total">0 đ</span>
                </div>
              </div>
              <div class="quote-create-actions">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" name="save_draft" value="1" class="btn btn-outline-secondary">
                  <i class="bi bi-save me-1"></i> Lưu nháp
                </button>
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-send me-1"></i> Tạo báo giá
                </button>
              </div>
            </div>
          </div>
        </form>

        <div class="quote-create-resizer" id="quote-create-resizer" role="separator" aria-orientation="vertical" aria-label="Kéo để thay đổi kích thước xem trước" title="Kéo để chỉnh rộng/hẹp · Double-click để đặt lại" tabindex="0">
          <span class="quote-create-resizer-grip"></span>
        </div>

        <aside class="quote-create-preview" id="quote-create-preview-panel">
          <div class="quote-create-preview-head">
            <span><i class="bi bi-file-earmark-text me-1"></i>Xem trước báo giá</span>
            <span class="quote-create-preview-badge">BG-NHÁP</span>
          </div>
          <div class="quote-create-preview-body" id="quote-create-preview-body">
            <div class="quote-create-preview-loading">
              <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
              <span>Đang tải xem trước...</span>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>
</div>

<script type="application/json" id="quote-catalog-data">{{ quote_catalog|tojson }}</script>
<script type="application/json" id="quote-preview-url">{{ url_for('quote_create_preview')|tojson }}</script>
<script type="application/json" id="quote-customer-options-url">{{ url_for('customer_options_json')|tojson }}</script>
{% if quote_customer_id %}
<script type="application/json" id="quote-pick-customer-id">{{ quote_customer_id|tojson }}</script>
{% endif %}
