{% extends 'base.html' %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
  <div>
    <h3 class="mb-0">Xem bản scan hợp đồng đã ký</h3>
    <p class="small-muted mb-0">{{ customer.name }}{% if contract.contract_code %} — {{ contract.contract_code }}{% endif %}</p>
  </div>
  <div class="d-flex flex-wrap gap-2">
    <a class="btn btn-outline-secondary" href="{{ back_url }}"><i class="bi bi-arrow-left me-1"></i> Quay lại khách hàng</a>
    <a class="btn btn-outline-primary" href="{{ download_url }}"><i class="bi bi-download me-1"></i> Tải xuống</a>
    {% if is_pdf %}
    <button type="button" class="btn btn-primary" onclick="window.print()"><i class="bi bi-printer me-1"></i> In</button>
    {% endif %}
  </div>
</div>

<div class="signed-scan-preview-page">
  {% if is_pdf %}
  <iframe src="{{ view_url }}" class="signed-scan-frame" title="Bản scan hợp đồng PDF"></iframe>
  {% else %}
  <div class="signed-scan-image-wrap">
    <img src="{{ view_url }}" alt="Bản scan hợp đồng đã ký" class="signed-scan-full-image">
  </div>
  {% endif %}
</div>
{% endblock %}
